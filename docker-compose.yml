services:
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_DB=my-api
      - POSTGRES_USER=cocky
      - POSTGRES_PASSWORD=admin2205
    ports:
      - 5432:5432
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@gmail.com
      - PGADMIN_DEFAULT_PASSWORD=ROOT
    ports:
      - 5050:80
  mysql:
    image: mysql:5
    environment:
      - MYSQL_DATABASE=my-api
      - MYSQL_ROOT_PASSWORD=admin2205
      - MYSQL_PORT=3306
    ports:
      - 3306:3306
    volumes:
      - ./mysql_data:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      - MYSQL_ROOT_PASSWORD=admin2205
      - PMA_HOST=mysql
    ports:
      - 8080:80
